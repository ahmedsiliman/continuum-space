<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="supabase-url" content="https://ssltbftsssafozraksno.supabase.co">
  <meta name="supabase-function-url" content="https://ssltbftsssafozraksno.supabase.co/functions/v1/get-model-url">
  <title>IFC BIM Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root {
      --glass-bg:   rgba(10, 10, 12, 0.55);
      --glass-bdr:  rgba(255, 255, 255, 0.08);
      --glass-shd:  0 8px 32px 0 rgba(0,0,0,0.37), inset 0 1px 1px rgba(255,255,255,0.1);
      --line-sub:   rgba(255, 255, 255, 0.05);
      --line-deep:  rgba(255, 255, 255, 0.04);
      --row-active: rgba(255, 255, 255, 0.06);
      --row-hover:  rgba(255, 255, 255, 0.03);
      --text-main:  rgba(255, 255, 255, 0.90);
      --text-muted: rgba(255, 255, 255, 0.50);
      --text-dark:  rgba(255, 255, 255, 0.25);
      --mono:       'Share Tech Mono', 'Consolas', monospace;
      --sidebar-w:  300px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;   /* sidebar LEFT */
      height: 100vh;
      background: transparent;
      color: var(--text-main);
      font-family: var(--mono);
      overflow: hidden;
    }

    /* ── Sidebar ──────────────────────────────────────── */
    #sidebar {
      border-right: 1px solid var(--glass-bdr);
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: var(--glass-shd);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
    }

    /* Fixed HUD header */
    .header {
      flex-shrink: 0;
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--line-sub);
    }

    .header h2 {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--text-dark);
      margin-bottom: 20px;
    }

    /* Inner-scrolling content only */
    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      display: flex;
      flex-direction: column;
      padding-bottom: 20px;
    }
    .content::-webkit-scrollbar { display: none; }

    /* HUD section headers */
    .section-title {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dark);
      padding: 14px 20px 12px;
      border-bottom: 1px solid var(--line-sub);
    }

    /* Structural indent line */
    .section-body {
      position: relative;
      padding: 8px 0;
    }
    .section-body::before {
      content: '';
      position: absolute;
      left: 20px; top: 0; bottom: 0;
      width: 1px;
      background: var(--line-deep);
    }

    /* Panel width slider */
    .panel-size { display: grid; gap: 6px; }
    .panel-size-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dark);
    }
    #panel-size-slider {
      width: 100%;
      accent-color: rgba(255,255,255,0.35);
      cursor: pointer;
      background: transparent;
    }

    /* Buttons */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 8px 20px 4px 36px;
    }
    .axis-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 6px 20px 4px 36px;
    }
    .actions button,
    .axis-actions button {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--glass-bdr);
      border-radius: 4px;
      padding: 7px 4px;
      cursor: pointer;
      transition: background 150ms ease, color 150ms ease;
    }
    .actions button:hover,
    .axis-actions button:hover {
      background: var(--row-hover);
      color: var(--text-main);
    }
    .actions button.full { grid-column: 1 / -1; }

    /* State pill */
    .state-pill {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--text-dark);
      border: 1px solid var(--line-sub);
      border-radius: 3px;
      padding: 4px 10px;
      display: inline-block;
      margin: 6px 20px 4px 36px;
    }

    /* Category list */
    .category-list {
      overflow-y: auto;
      scrollbar-width: none;
      padding: 4px 20px 4px 36px;
    }
    .category-list::-webkit-scrollbar { display: none; }

    .category-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: color 150ms ease;
      cursor: default;
    }
    .category-item:hover { color: var(--text-main); }
    .category-item input {
      accent-color: rgba(255,255,255,0.45);
      cursor: pointer;
    }

    .empty {
      font-size: 10px;
      letter-spacing: 0.5px;
      color: var(--text-dark);
      padding: 8px 20px 4px 36px;
      text-transform: none;
      font-style: italic;
    }

    /* Dropdowns */
    .dropdown { border-top: 1px solid var(--line-sub); }
    .dropdown-toggle {
      width: 100%;
      border: none;
      background: none;
      color: var(--text-muted);
      text-align: left;
      padding: 10px 20px 10px 36px;
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 150ms ease, color 150ms ease;
    }
    .dropdown-toggle:hover {
      background: var(--row-hover);
      color: var(--text-main);
    }
    .dropdown-panel { display: block; padding: 4px 0 8px; }
    .dropdown-panel.collapsed { display: none; }

    /* Badge */
    .badge {
      display: inline-block;
      margin: 6px 20px 2px 36px;
      padding: 3px 8px;
      border: 1px solid var(--glass-bdr);
      border-radius: 3px;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--text-dark);
    }

    /* Active style button */
    .style-btn.active-style {
      background: var(--row-active) !important;
      color: var(--text-main) !important;
      border-color: var(--glass-bdr) !important;
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      background: rgba(10,10,12,0.75);
      border: 1px solid var(--glass-bdr);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 12px 20px;
      z-index: 10;
      max-width: 80%;
      text-align: center;
    }

    /* Viewer */
    #viewer-container {
      position: relative;
      min-width: 0;
      background: transparent;
    }

    /* Responsive */
    @media (max-width: 900px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      #sidebar {
        border-right: none;
        border-bottom: 1px solid var(--glass-bdr);
        max-height: 42vh;
      }
    }
  </style>
</head>
<body>

  <!-- Sidebar LEFT -->
  <aside id="sidebar">
    <div class="header">
      <h2>// Control Center ;</h2>
      <div class="panel-size">
        <div class="panel-size-row">
          <span>Panel Width</span>
          <span id="panel-size-value">300px</span>
        </div>
        <input id="panel-size-slider" type="range" min="240" max="480" step="10" value="300">
      </div>
    </div>

    <!-- Scrollable body -->
    <div class="content">

      <div class="section-title">Visual Style</div>
      <div class="section-body">
        <div class="actions">
          <button id="btn-style-solid"       class="style-btn active-style" type="button">Solid</button>
          <button id="btn-style-clay"        class="style-btn"              type="button">Clay</button>
          <button id="btn-style-hidden-line" class="style-btn full"         type="button">Hidden Line</button>
        </div>
      </div>

      <div class="section-title">Section Tool</div>
      <div class="section-body">
        <div id="section-state" class="state-pill">Axis: - | Flip: Normal</div>
        <div class="actions">
          <button id="btn-flip-section" class="full" type="button">Toggle Flip</button>
        </div>
        <div class="axis-actions">
          <button id="btn-x-section" type="button">X</button>
          <button id="btn-y-section" type="button">Y</button>
          <button id="btn-z-section" type="button">Z</button>
        </div>
      </div>

      <div class="section-title">Filters</div>
      <div class="section-body">
        <div class="actions" style="margin-bottom: 4px;">
          <button id="btn-show-all" class="full" type="button">Reset Visibility</button>
        </div>

        <div class="dropdown">
          <button id="btn-toggle-categories" class="dropdown-toggle" type="button">
            <span>Categories</span>
            <span id="categories-arrow">▼</span>
          </button>
          <div id="categories-panel" class="dropdown-panel collapsed">
            <div id="category-list" class="category-list">
              <div class="empty">Categories appear after IFC loads.</div>
            </div>
          </div>
        </div>

        <div class="dropdown">
          <button id="btn-toggle-levels" class="dropdown-toggle" type="button">
            <span>Level Filter</span>
            <span id="levels-arrow">▼</span>
          </button>
          <div id="levels-panel" class="dropdown-panel collapsed">
            <div class="empty">Storey filtering — next stage.</div>
          </div>
        </div>
      </div>

    </div><!-- /.content -->
  </aside>

  <!-- Viewer RIGHT -->
  <div id="viewer-container">
    <div id="loading">Initializing That Open viewer...</div>
  </div>

  <script type="module" src="./main.bundle.js"></script>
</body>
</html>
